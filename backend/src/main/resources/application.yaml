spring:
  application:
    name: leave-calendar
  datasource:
    url: jdbc:postgresql://localhost:5434/leave_calendar_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origin: http://localhost:4200

logging:
  level:
    org.hibernate.SQL: debug